services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres_banco_bogota
    environment:
      POSTGRES_DB: practicantes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Bbogota
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: